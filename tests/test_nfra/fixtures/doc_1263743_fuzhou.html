<p class="MsoNormal">抚州金融监管分局关于抚州富民村镇银行股份有限公司变更注册资本的批复</p>
<p class="MsoNormal">一、同意抚州富民村镇银行股份有限公司变更注册资本。本次变更后，抚州富民村镇银行股份有限公司注册资本由人民币15000万元变更为人民币20000万元。</p>
